<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Текстовый файл</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        #text-area {
            width: 100%;
            height: 90vh; /* Почти на весь экран */
            background: #252526;
            color: #d4d4d4;
            border: 1px solid #333;
            padding: 15px;
            font-size: 14px;
            resize: none; /* Запрет растягивания мышкой, так как оно само адаптируется */
        }
        .controls { margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007acc; color: white; border: none; border-radius: 4px; font-size: 16px;}
        button:hover { background: #005f9e; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="copyAll()">Скопировать всё</button>
    </div>

    <!-- Используем textarea, так как в него проще всего вставить огромный текст без ошибок HTML -->
    <textarea id="text-area" readonly>
<!-- ВСТАВЬ СВОЙ ТЕКСТ НИЖЕ ЭТОЙ СТРОКИ -->

Сюда вставь свой огромный текст вместо этой строки.

<!-- ВСТАВЬ СВОЙ ТЕКСТ ВЫШЕ ЭТОЙ СТРОКИ -->
    </textarea>

    <script>
        function copyAll() {
            const copyText = document.getElementById("text-area");
            copyText.select();
            copyText.setSelectionRange(0, 999999); /* Для мобильных */
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("Текст скопирован в буфер обмена!");
            });
        }
    </script>

</body>
</html>
